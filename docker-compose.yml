version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: educast_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: educast_db
      MYSQL_USER: educast
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - educast_network

  redis:
    image: redis:7-alpine
    container_name: educast_redis
    ports:
      - "6379:6379"
    networks:
      - educast_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educast_backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=educast_db
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend:/app
    networks:
      - educast_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educast_frontend
    ports:
      - "5174:5174"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - educast_network

volumes:
  mysql_data:

networks:
  educast_network:
    driver: bridge
